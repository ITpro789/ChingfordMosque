<!DOCTYPE html>
<html lang="en">
<head><meta charset="utf-8"><title>Chingford Masjid</title></head>
<body>
<header>Welcome to Chingford Masjid</header>

<!-- The widget is locatable (it carries the anchor prayer labels) but a begin-time cell holds
     a garbled, unparseable token ("--:--"). The parser must surface ProviderError.ParseError
     rather than guessing or throwing (Requirement 8.2). -->
<div class="fusion-text fusion-text-12"><p><strong>Daily Salah Times</strong></p></div>
<table class="dptTimetable  customStyles dptUserStyles">
  <tr>
    <th colspan="3" style="text-align:center"> June 30, 2026 </th>
  </tr>
  <tr>
    <th class="tableHeading">Prayer</th>
    <th class="tableHeading">Begins</th>
    <th class="tableHeading">Iqamah</th>
  </tr>
  <tr>
    <th class="prayerName ">Fajr</th><td class="begins ">--:--</td>
    <td class="jamah ">4:15 am</td>
  </tr>
  <tr>
    <th class="prayerName ">Sunrise</th><td colspan="2" class="">4:46 am</td>
  </tr>
  <tr>
    <th class="prayerName ">Zuhr</th><td class="begins ">1:08 pm</td>
    <td class="jamah ">1:30 pm</td>
  </tr>
  <tr>
    <th class="prayerName ">Asr</th><td class="begins ">6:40 pm</td>
    <td class="jamah ">7:45 pm</td>
  </tr>
  <tr>
    <th class="prayerName highlight">Maghrib</th><td class="begins highlight">9:24 pm</td>
    <td class="jamah highlight">9:24 pm</td>
  </tr>
  <tr>
    <th class="prayerName ">Isha</th><td class="begins ">10:32 pm</td>
    <td class="jamah ">10:45 pm</td>
  </tr>
</table>

<footer>Go to Top</footer>
</body>
</html>
