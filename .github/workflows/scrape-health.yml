name: Scrape Health
on:
  schedule:
    - cron: "17 6 * * *"   # daily ~06:17 UTC
  workflow_dispatch:
jobs:
  check:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-java@v4
        with:
          distribution: temurin
          java-version: '17'
      - run: chmod +x ./gradlew
      - name: Verify the mosque site still parses
        run: ./gradlew :monitor:run --no-daemon --quiet
