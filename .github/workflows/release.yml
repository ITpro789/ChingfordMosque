name: Release

on:
  push:
    tags:
      - 'v*'
  workflow_dispatch:

permissions:
  contents: write

jobs:
  release:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Set up JDK 17
        uses: actions/setup-java@v4
        with:
          distribution: temurin
          java-version: '17'

      - name: Set up Android SDK
        uses: android-actions/setup-android@v3

      - name: Grant execute permission for gradlew
        run: chmod +x ./gradlew

      - name: Run core unit tests
        run: ./gradlew :core:test --no-daemon --stacktrace

      # Decode the upload keystore from a base64 secret, if one is configured.
      # When KEYSTORE_BASE64 is empty the step is a no-op and the release build
      # falls back to debug signing (the resulting AAB is NOT Play-uploadable).
      - name: Decode signing keystore
        id: signing
        env:
          KEYSTORE_BASE64: ${{ secrets.KEYSTORE_BASE64 }}
        run: |
          if [ -n "$KEYSTORE_BASE64" ]; then
            echo "$KEYSTORE_BASE64" | base64 -d > "$RUNNER_TEMP/upload.jks"
            echo "CM_KEYSTORE_PATH=$RUNNER_TEMP/upload.jks" >> "$GITHUB_ENV"
            echo "Signing keystore decoded; release artifacts will be signed with the upload key."
          else
            echo "No KEYSTORE_BASE64 secret set; release build will use the debug-signing fallback."
            echo "The resulting AAB/APK will NOT be uploadable to Google Play until signing secrets are configured."
          fi

      - name: Build release bundle and APK
        env:
          CM_KEYSTORE_PASSWORD: ${{ secrets.KEYSTORE_PASSWORD }}
          CM_KEY_ALIAS: ${{ secrets.KEY_ALIAS }}
          CM_KEY_PASSWORD: ${{ secrets.KEY_PASSWORD }}
        run: ./gradlew :app:bundleRelease :app:assembleRelease --no-daemon --stacktrace

      - name: Upload AAB artifact
        uses: actions/upload-artifact@v4
        with:
          name: ChingfordMosque-release-aab
          path: app/build/outputs/bundle/release/*.aab
          if-no-files-found: error

      - name: Upload APK artifact
        uses: actions/upload-artifact@v4
        with:
          name: ChingfordMosque-release-apk
          path: app/build/outputs/apk/release/*.apk
          if-no-files-found: error

      - name: Publish to GitHub Release
        uses: softprops/action-gh-release@v2
        with:
          tag_name: ${{ github.ref_type == 'tag' && github.ref_name || format('app-v{0}', github.run_number) }}
          name: ${{ github.ref_type == 'tag' && github.ref_name || format('app-v{0}', github.run_number) }}
          body: |
            Chingford Mosque Prayer Times release.

            Commit: ${{ github.sha }}

            Artifacts attached:
            - `*.aab` — Android App Bundle for Google Play upload.
            - `*.apk` — installable build for sideloading.

            If signing secrets are not configured on the repository, these
            artifacts are debug-signed and NOT uploadable to Google Play. See
            RELEASING.md for how to configure signing.
          files: |
            app/build/outputs/bundle/release/*.aab
            app/build/outputs/apk/release/*.apk
          fail_on_unmatched_files: true
